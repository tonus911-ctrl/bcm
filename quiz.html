*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F9EBC6;--black:#000;--gray:#8F8F8F;--border:#dedede}
body{font-family:'Inter','Calibri',Arial,sans-serif;background:#f5f5f5;color:var(--black)}
.header{background:var(--black);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{color:#fff;font-size:16px;font-weight:700;text-decoration:none}
.logo span{color:var(--cream)}
.lang-toggle{display:flex;background:#222;border-radius:7px;padding:3px;gap:3px}
.lang-btn{padding:7px 16px;border-radius:5px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:none;background:transparent;color:#777;transition:all .15s}
.lang-btn.active{background:var(--cream);color:#000}
.lang-btn:hover:not(.active){color:#fff}
.progress-bar-wrap{background:#e0e0e0;height:3px}
.progress-bar{height:3px;background:var(--black);transition:width .4s;width:0%}
.container{max-width:620px;margin:0 auto;padding:36px 20px 60px}
.screen{display:none}.screen.active{display:block}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin-bottom:12px}
.big-title{font-size:26px;font-weight:700;line-height:1.25;margin-bottom:14px}
.sub-text{font-size:15px;line-height:1.65;color:var(--gray);margin-bottom:24px}
.highlight-box{background:var(--cream);border-radius:10px;padding:14px 18px;font-size:14px;line-height:1.6;margin-bottom:28px}
.meta-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:32px}
.meta-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--gray)}
.meta-dot{width:7px;height:7px;border-radius:50%;background:var(--black);flex-shrink:0}
.q-counter{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:10px}
.q-text{font-size:18px;font-weight:700;line-height:1.35;margin-bottom:24px}
.options{display:flex;flex-direction:column;gap:9px}
.option{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;font-size:14px;font-family:inherit;line-height:1.45;color:var(--black);text-align:left;transition:all .15s}
.option:hover{border-color:var(--black);background:var(--cream)}
.option.selected{border-color:var(--black);background:var(--cream)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:12px 26px;border-radius:8px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;border:none;text-decoration:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-black{background:var(--black);color:#fff}.btn-black:hover{opacity:.82}
.btn-cream{background:var(--cream);color:var(--black);border:1.5px solid var(--black)}.btn-cream:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--gray);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--cream);border-color:var(--black);color:var(--black)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-full{width:100%;justify-content:center}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}
@media(max-width:480px){.btn-row{flex-direction:column}}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--black);background:#fff;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--black)}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
.privacy-note{font-size:11px;color:var(--gray);line-height:1.5;margin-top:10px}
.sending-note{font-size:12px;color:var(--gray);text-align:center;margin-top:8px;display:none}
.error-note{font-size:12px;color:#c0392b;text-align:center;margin-top:8px;display:none}
.result-banner{border-radius:12px;padding:26px 22px;margin-bottom:20px}
.level-badge{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:20px;display:inline-block;margin-bottom:10px}
.result-title-big{font-size:24px;font-weight:700;margin-bottom:4px}
.result-sub{font-size:14px;opacity:.75}
.score-pill{display:inline-flex;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 13px;font-size:12px;color:#fff;margin-bottom:4px}
.level-track{display:flex;gap:5px;margin-bottom:20px}
.l-seg{flex:1;height:7px;border-radius:4px;background:#e0e0e0}
.l-seg.filled{background:currentColor}
.result-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin-bottom:8px}
.card-text{font-size:14px;line-height:1.65;color:#222}

.result-cta{background:var(--black);border-radius:12px;padding:26px 22px;margin-top:22px;text-align:center}
.result-cta h3{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
.result-cta p{font-size:14px;color:var(--gray);line-height:1.6;margin-bottom:20px}
.cta-buttons{display:flex;flex-direction:column;align-items:center;gap:10px}

/* Consent checkbox */
.consent-row{display:flex;align-items:flex-start;gap:10px;margin:16px 0}
.consent-row input[type=checkbox]{appearance:none;-webkit-appearance:none;margin:2px 0 0 0;width:18px;height:18px;min-width:18px;flex-shrink:0;cursor:pointer;border:1.5px solid var(--border);border-radius:4px;background:#fff;position:relative}
.consent-row input[type=checkbox]:checked{background:var(--black);border-color:var(--black)}
.consent-row input[type=checkbox]:checked::after{content:"";position:absolute;left:5px;top:1px;width:4px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.consent-row label{font-size:12px;color:var(--gray);line-height:1.55;cursor:pointer}
.consent-row a{color:var(--black);text-decoration:underline}

.contact-success{background:#eafaf1;border:1.5px solid #27ae60;border-radius:10px;padding:16px 18px;font-size:14px;line-height:1.6;color:#0e5230;display:none;margin-top:12px}

.t1{background:#fff0ee}.t1 .result-title-big,.t1 .result-sub{color:#7d1f1f}.t1 .level-badge{background:#c0392b;color:#fff}.t1-c{color:#c0392b}

.t3{background:#F9EBC6}.t3 .result-title-big,.t3 .result-sub{color:#6b4f00}.t3 .level-badge{background:#c89800;color:#fff}.t3-c{color:#c89800}

function buildSteps(lv, answers) {
  const qs = QU[lang];
  const isSmall        = answers[0] === 0;
  const isConcentrated = answers[2] === 2;
  const highImpact     = answers[1] !== null && qs[1].opts[answers[1]].s <= 0.5;
  const survivedLuck   = answers[6] !== null && qs[6].opts[answers[6]].s === 0;

  let steps = isSmall ? lv.stepsSmall : lv.stepsBig;

  if (isConcentrated && lv.n <= 3) {
    steps += lang === "ru"
      ? "\n\nОтдельно разберём распределение функций: сейчас критические процессы сосредоточены у одного-двух человек. Это ваша главная зона риска. Перераспределим так, чтобы уход любого сотрудника не парализовал работу."
      : "\n\nWe will specifically address function distribution: critical processes are currently concentrated in one or two people. This is your main risk zone. We will redistribute so that any person's departure does not paralyse operations.";
  }

  if (highImpact && lv.n <= 3) {
    steps += lang === "ru"
      ? "\n\nПоскольку остановка критична для вашего бизнеса, важно не просто знать риски, но и понять — какой сценарий реализуется с наибольшей вероятностью именно в вашей отрасли. Начнём с него: это даёт максимальную защиту при минимальных усилиях и времени."
      : "\n\nSince downtime is critical for your business, the priority is to identify which specific scenario is most likely to hit your industry first. We start there: this gives you maximum protection for minimum effort and time.";
  }

  const alreadyHasReserve = steps.includes(lang === "ru" ? "финансов" : "financial reserve") ||
                            steps.includes(lang === "ru" ? "подушку" : "reserve you need");
  if (lv.n <= 4 && !alreadyHasReserve) {
    steps += lang === "ru"
      ? "\n\nОтдельно рассчитаем, сколько стоит один день простоя вашего бизнеса в деньгах и определим размер финансовой подушки — конкретную сумму, которую стоит держать в резерве на случай непредвиденной остановки. Это один из самых практичных инструментов защиты, доступных любой компании."
      : "\n\nWe will also calculate exactly how much one day of your downtime costs in monetary terms and determine the size of the financial reserve — a specific amount worth keeping as a buffer against an unexpected shutdown. This is one of the most practical protective tools available to any company.";
  }

  if (survivedLuck && lv.n <= 3) {
    steps += lang === "ru"
      ? "\n\nВажно: то, что вы уже пережили кризис — это ценный опыт. Но выживание «вопреки» и выживание «благодаря системе» — разные вещи. Следующий кризис может пойти иначе. Используем ваш опыт, чтобы построить защиту, которая работает не случайно."
      : "\n\nImportant: the fact that you have already survived a crisis is valuable experience. But surviving despite everything and surviving because of a system are very different things. The next crisis may unfold differently. We will use your experience to build protection that works by design, not by luck.";
  }

  return steps;
}

  document.getElementById("btnRU").classList.toggle("active", lang==="ru");
  document.getElementById("btnEN").classList.toggle("active", lang==="en");

  const ids = {
    "t-intro-label":t.introLabel,"t-intro-title":t.introTitle,
    "t-intro-desc":t.introDesc,"t-intro-hl":t.introHl,
    "t-m1":t.meta[0],"t-m2":t.meta[1],"t-m3":t.meta[2],
    "t-start-btn":t.startBtn,
    "t-what-label":t.whatLabel,"t-risks-label":t.risksLabel,"t-steps-label":t.stepsLabel,
    "t-cont-label":t.contLabel,"t-cont-title":t.contTitle,"t-cont-desc":t.contDesc,
    "t-lbl-name":t.lblName,"t-lbl-company":t.lblCompany,"t-lbl-email":t.lblEmail,
    "btnSkip":t.skipBtn,"btnSubmit":t.submitBtn,
    "sendingNote":t.sending,"errorNote":t.errMsg,
    "t-tg-btn":t.tgBtn
  };
  Object.entries(ids).forEach(([id,val])=>{
    const el = document.getElementById(id);
    if(el) el.textContent = val;
  });
  document.getElementById("t-consent").innerHTML = t.consentText;
  document.getElementById("fName").placeholder    = t.phName;
  document.getElementById("fCompany").placeholder = t.phCompany;
  document.getElementById("fEmail").placeholder   = t.phEmail;

  const screen = document.querySelector(".screen.active");
  if(screen && screen.id==="s-questions") renderQ();
}

function setLang(l) {
  lang = l;
  answers = new Array(QU[lang].length).fill(null);
  cur = 0;
  formSubmitted = false;
  renderUI();
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

function updateProgress(pct) {
  document.getElementById("progressBar").style.width=(pct*100)+"%";
}

// ═══════════════════════════════════
// QUIZ
// ═══════════════════════════════════
function startQuiz() {
  answers = new Array(QU[lang].length).fill(null);
  cur = 0;
  showScreen("s-questions");
  renderQ();
}

function renderQ() {
  const t = T[lang], qs = QU[lang], q = qs[cur];
  document.getElementById("qCounter").textContent =
    lang==="ru" ? `Вопрос ${cur+1} из ${qs.length}` : `Question ${cur+1} of ${qs.length}`;
  document.getElementById("qText").textContent = q.text;
  const wrap = document.getElementById("qOptions");
  wrap.innerHTML = "";
  q.opts.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.className = "option"+(answers[cur]===i?" selected":"");
    btn.textContent = opt.t;
    btn.onclick = ()=>selectOpt(i);
    wrap.appendChild(btn);
  });
  document.getElementById("btnBack").textContent = T[lang].qBack;
  document.getElementById("btnBack").style.visibility = cur===0?"hidden":"visible";
  document.getElementById("btnNext").textContent = cur===QU[lang].length-1 ? T[lang].qFinish : T[lang].qNext;
  document.getElementById("btnNext").disabled = answers[cur]===null;
  updateProgress(cur/QU[lang].length);
}

function selectOpt(i) {
  answers[cur] = i;
  document.querySelectorAll(".option").forEach((el,idx)=>el.classList.toggle("selected",idx===i));
  document.getElementById("btnNext").disabled = false;
}

function nextQ() {
  if(answers[cur]===null) return;
  const qs = QU[lang];
  if(cur<qs.length-1){cur++;renderQ();}
  else {
    finalScore = Math.round(answers.reduce((s,a,i)=>s+(a!==null?qs[i].opts[a].s:0),0)*2)/2;
    finalLevel = getLevel(finalScore);
    finalSteps = buildSteps(finalLevel, answers);
    showContactScreen();
  }
}

function prevQ() {
  if(cur>0){cur--;renderQ();}
}

function getLevel(score) {
  const lvs = LV[lang];
  if(score<6)  return lvs[0];
  if(score<12) return lvs[1];
  if(score<18) return lvs[2];
  if(score<23) return lvs[3];
  return lvs[4];
}

// ═══════════════════════════════════
// OPTIONAL CONTACT FORM
// ═══════════════════════════════════
function showContactScreen() {
  showScreen("s-contacts");
  updateProgress(0.92);
  formSubmitted = false;
  document.getElementById("fName").value="";
  document.getElementById("fCompany").value="";
  document.getElementById("fEmail").value="";
  document.getElementById("fConsent").checked=false;
  document.getElementById("contactSuccess").style.display="none";
  document.getElementById("errorNote").style.display="none";
  document.getElementById("sendingNote").style.display="none";
  document.querySelector(".btn-row").style.display="flex";
}

function skipForm() {
  sendSkippedNotification();
  showResults();
}

async function sendSkippedNotification() {
  const t = T[lang];
  const lv = finalLevel;
  const body = {
    name: "Стесняшка",
    company: "—",
    email: "—",
    language: lang.toUpperCase(),
    score: t.scoreLabel(finalScore),
    level: t.levelLabel(lv.n, lv.name),
    description: lv.desc,
    risks: lv.risks,
    recommendations: finalSteps,
    answers: buildSummary()
  };
  try {
    await fetch("https://risk-place-quiz.tonus911.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
  } catch(e) {
    // Тихо игнорируем — пользователь не должен видеть ошибку при пропуске формы
  }
}

// ═══════════════════════════════════
// RESULTS
// ═══════════════════════════════════
function setCTA(lv) {
  const t = T[lang];
  let cta;
  if(lv.n <= 2) cta = t.ctaLow;
  else if(lv.n <= 4) cta = t.ctaMid;
  else cta = t.ctaHigh;
  document.getElementById("t-cta-title").textContent = cta.title;
  document.getElementById("t-cta-desc").textContent  = cta.desc;
  document.getElementById("t-cta-btn").textContent   = t.ctaBtn;
}

function showResults() {
  const t = T[lang], lv = finalLevel;
  showScreen("s-results");
  updateProgress(1);

  document.getElementById("resBanner").className = "result-banner "+lv.theme;
  document.getElementById("resBadge").textContent = t.levelLabel(lv.n,lv.name);
  document.getElementById("resPill").textContent  = t.scoreLabel(finalScore);
  document.getElementById("resTitle").textContent = lv.name;
  document.getElementById("resSub").textContent   = lv.sub;

  const track = document.getElementById("resTrack");
  track.innerHTML="";
  for(let i=1;i<=5;i++){
    const seg=document.createElement("div");
    seg.className="l-seg"+(i<=lv.n?" filled "+lv.tc:"");
    track.appendChild(seg);
  }

  document.getElementById("resDesc").textContent = lv.desc;
  document.getElementById("resRisks").innerHTML =
    lv.risks.split(". ").filter(Boolean)
      .map(s=>`<p style="margin-bottom:5px">— ${s.trim()}.</p>`).join("");

  const stepsLines = finalSteps.split("\n").filter(Boolean);
  document.getElementById("resSteps").innerHTML =
    stepsLines.map(l=>`<p style="margin-bottom:8px">${l}</p>`).join("");

  setCTA(lv);
}

// ═══════════════════════════════════
// FORM SUBMIT (optional, before results)
// ═══════════════════════════════════
function buildSummary() {
  const qs = QU[lang];
  return qs.map((q,i)=>{
    const a = answers[i];
    return `Q${i+1}: ${q.text}\n → ${a!==null?q.opts[a].t:"—"} (${a!==null?q.opts[a].s:0})`;
  }).join("\n\n");
}

async function submitForm() {
  if(formSubmitted) return;
  const t = T[lang];
  const name    = document.getElementById("fName").value.trim();
  const company = document.getElementById("fCompany").value.trim();
  const email   = document.getElementById("fEmail").value.trim();
  const consent = document.getElementById("fConsent").checked;

  if(!name||!company||!email){alert(t.alert);return;}
  if(!consent){alert(t.alertConsent);return;}

  const lv   = finalLevel;
  const btn  = document.getElementById("btnSubmit");
  const skip = document.getElementById("btnSkip");
  const note = document.getElementById("sendingNote");
  const err  = document.getElementById("errorNote");
  btn.disabled=true; skip.disabled=true; note.style.display="block"; err.style.display="none";

  const body = {
    name, company, email,
    language: lang.toUpperCase(),
    score: t.scoreLabel(finalScore),
    level: t.levelLabel(lv.n, lv.name),
    description: lv.desc,
    risks: lv.risks,
    recommendations: finalSteps,
    answers: buildSummary()
  };

  try {
    const res = await fetch("https://risk-place-quiz.tonus911.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    const result = await res.json();
    if(!res.ok || !result.success) throw new Error("fail");

    formSubmitted = true;
    note.style.display="none";
    document.querySelector(".btn-row").style.display="none";
    const success = document.getElementById("contactSuccess");
    success.textContent = t.successMsg;
    success.style.display="block";

    setTimeout(showResults, 1100);
  } catch(e) {
    note.style.display="none";
    err.style.display="block";
    btn.disabled=false; skip.disabled=false;
  }
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
renderUI();
showScreen("s-intro");
</script>
