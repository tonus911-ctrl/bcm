.btn-row .btn{flex:1}

  if (survivedLuck && lv.n <= 3) {
    steps += lang === "ru"
      ? "\n\nВажно: то, что вы уже пережили кризис — это ценный опыт. Но выживание «вопреки» и выживание «благодаря системе» — разные вещи. Следующий кризис может пойти иначе. Используем ваш опыт, чтобы построить защиту, которая работает не случайно."
      : "\n\nImportant: the fact that you have already survived a crisis is valuable experience. But surviving despite everything and surviving because of a system are very different things. The next crisis may unfold differently. We will use your experience to build protection that works by design, not by luck.";
  }

  return steps;
}

function setLang(l) {

}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

}

function updateProgress(pct) {
  document.getElementById("progressBar").style.width=(pct*100)+"%";
}

// ═══════════════════════════════════
// QUIZ
// ═══════════════════════════════════
function startQuiz() {
  answers = new Array(QU[lang].length).fill(null);
  cur = 0;
  showScreen("s-questions");
  renderQ();
}

function renderQ() {
  const t = T[lang], qs = QU[lang], q = qs[cur];
  document.getElementById("qCounter").textContent =
    lang==="ru" ? `Вопрос ${cur+1} из ${qs.length}` : `Question ${cur+1} of ${qs.length}`;
  document.getElementById("qText").textContent = q.text;
  const wrap = document.getElementById("qOptions");
  wrap.innerHTML = "";
  q.opts.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.className = "option"+(answers[cur]===i?" selected":"");
    btn.textContent = opt.t;
    btn.onclick = ()=>selectOpt(i);
    wrap.appendChild(btn);
  });
  document.getElementById("btnBack").textContent = T[lang].qBack;
  document.getElementById("btnBack").style.visibility = cur===0?"hidden":"visible";
  document.getElementById("btnNext").textContent = cur===QU[lang].length-1 ? T[lang].qFinish : T[lang].qNext;
  document.getElementById("btnNext").disabled = answers[cur]===null;
  updateProgress(cur/QU[lang].length);
}

function selectOpt(i) {
  answers[cur] = i;
  document.querySelectorAll(".option").forEach((el,idx)=>el.classList.toggle("selected",idx===i));
  document.getElementById("btnNext").disabled = false;
}

function nextQ() {
  if(answers[cur]===null) return;
  const qs = QU[lang];
  if(cur<qs.length-1){cur++;renderQ();}
  else {
    finalScore = Math.round(answers.reduce((s,a,i)=>s+(a!==null?qs[i].opts[a].s:0),0)*2)/2;
    finalLevel = getLevel(finalScore);
    finalSteps = buildSteps(finalLevel, answers);
    finalSize = SIZE_MAP[answers[0]] || 'md';
    notified = false;
    showResults();
  }
}

function prevQ() {
  if(cur>0){cur--;renderQ();}
}

function getLevel(score) {
  const lvs = LV[lang];
  if(score<6)  return lvs[0];
  if(score<12) return lvs[1];
  if(score<18) return lvs[2];
  if(score<23) return lvs[3];
  return lvs[4];
}

function setCTA(lv) {
  const t = T[lang];

  if(lv.n <= 2) cta = t.ctaLow;
  else if(lv.n <= 4) cta = t.ctaMid;
  else cta = t.ctaHigh;
  document.getElementById("t-cta-title").textContent = cta.title;
  document.getElementById("t-cta-desc").textContent  = cta.desc;
  document.getElementById("t-cta-btn").textContent   = t.ctaBtn;
}

function showResults() {
  const t = T[lang], lv = finalLevel;
  showScreen("s-results");
  updateProgress(1);

  document.getElementById("resBanner").className = "result-banner "+lv.theme;
  document.getElementById("resBadge").textContent = t.levelLabel(lv.n,lv.name);
  document.getElementById("resPill").textContent  = t.scoreLabel(finalScore);
  document.getElementById("resTitle").textContent = lv.name;
  document.getElementById("resSub").textContent   = lv.sub;

  const track = document.getElementById("resTrack");
  track.innerHTML="";
  for(let i=1;i<=5;i++){
    const seg=document.createElement("div");
    seg.className="l-seg"+(i<=lv.n?" filled "+lv.tc:"");
    track.appendChild(seg);
  }

  document.getElementById("resDesc").textContent = lv.desc;
  document.getElementById("resRisks").innerHTML =
    lv.risks.split(". ").filter(Boolean)

function buildSummary() {
  const qs = QU[lang];
  return qs.map((q,i)=>{
    const a = answers[i];
    return `Q${i+1}: ${q.text}\n → ${a!==null?q.opts[a].t:"—"} (${a!==null?q.opts[a].s:0})`;
  }).join("\n\n");
}

async function submitForm() {
  if(formSubmitted) return;
  const t = T[lang];
  const name    = document.getElementById("fName").value.trim();
  const company = document.getElementById("fCompany").value.trim();
  const contact = document.getElementById("fEmail").value.trim();
  const consent = document.getElementById("fConsent").checked;

  if(!name||!company||!contact){alert(t.alert);return;}
  if(!consent){alert(t.alertConsent);return;}

  const lv   = finalLevel;
  const btn  = document.getElementById("btnSubmit");
  const skip = document.getElementById("btnSkip");
  const note = document.getElementById("sendingNote");
  const err  = document.getElementById("errorNote");
  btn.disabled=true; skip.disabled=true; note.style.display="block"; err.style.display="none";

  const c = recCell();
  const recRu = PRODUCTS[leadProduct] ? PRODUCTS[leadProduct].ru : "—";
  const body = {
    name, company: company + " · " + contact, email: "—",
    product: recRu,
    comment: "Размер компании: " + (SIZE_TEXT[answers[0]]||SIZE_LABEL[finalSize]),
    language: lang.toUpperCase(),
    score: t.scoreLabel(finalScore),
    level: t.levelLabel(lv.n, lv.name),
    description: lv.desc,
    risks: lv.risks,
    recommendations: "▸ Размер: " + (SIZE_TEXT[answers[0]]||SIZE_LABEL[finalSize]) + " · системная рекомендация: " + PRODUCTS[c.p].ru + " · интересует: " + recRu + "\n\n" + finalSteps,
    answers: buildSummary()
  };

  try {
    const res = await fetch("https://risk-place-quiz.tonus911.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    const result = await res.json();
    if(!res.ok || !result.success) throw new Error("fail");

    formSubmitted = true;
    note.style.display="none";
    document.querySelector(".btn-row").style.display="none";
    const success = document.getElementById("contactSuccess");
    success.textContent = t.successMsg;
    success.style.display="block";

    setTimeout(showResults, 1100);
  } catch(e) {
    note.style.display="none";
    err.style.display="block";
    btn.disabled=false; skip.disabled=false;
  }
}
